[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/db run push-force && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "pnpm --filter @workspace/api-server run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[environments.production]
NODE_ENV = "production"
